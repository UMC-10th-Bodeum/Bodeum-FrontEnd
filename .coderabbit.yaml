# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# =========================================================
# CodeRabbit 설정 파일
# 위치: Bodeum-FrontEnd/.coderabbit.yaml
# 목적: React + TypeScript + Vite 프론트엔드 PR 자동 리뷰
# =========================================================

# 리뷰 언어 설정
# 나중에 영어 리뷰가 필요하면 "en-US"로 변경
language: "ko-KR"

# 리뷰 말투 설정
# 주의: 공식 설정상 tone_instructions는 너무 길게 쓰면 안 됨.
# 나중에 팀 분위기에 맞게 "더 엄격하게", "더 짧게", "근거 중심으로" 등으로 조정 가능
tone_instructions: >
  한국어로 간결하고 실용적으로 리뷰해줘. 실제 버그, 유지보수성, 타입 안정성, UX 영향이 큰 문제를 우선해줘.

chat:
  # PR 댓글에서 @coderabbitai로 부르면 자동 답변
  # 나중에 댓글 자동응답이 너무 시끄러우면 false로 변경
  auto_reply: true

reviews:
  # 리뷰 강도
  # chill: 가볍고 덜 까다로운 리뷰
  # assertive: 더 꼼꼼하지만 잔소리가 많아질 수 있음
  # 초기 개발 단계: chill 추천
  # 배포 직전 / 리팩토링 PR / 버그 민감 구간: assertive 고려
  profile: "chill"

  # CodeRabbit이 자동으로 approve/request changes 흐름에 관여하는 옵션
  # 초기 팀플에서는 false 추천
  # 나중에 CI, 테스트, 리뷰 규칙이 안정되면 true 검토 가능
  request_changes_workflow: false

  # PR 전체 요약 생성
  # PR 설명을 팀원들이 자주 보면 true 유지
  # 요약이 너무 길거나 필요 없으면 false
  high_level_summary: true

  # 변경된 파일별 요약 표시
  # 파일 수가 많아지는 시점부터 특히 유용하니 true 유지 추천
  changed_files_summary: true

  # 리뷰 상태 메시지 표시
  # 예: 리뷰 진행 중, 완료, 스킵 사유 등
  review_status: true

  # 리뷰 세부 정보 표시
  # true로 하면 무시된 파일, 사용한 추가 컨텍스트 등이 더 자세히 나옴
  # 처음엔 PR 댓글이 길어지지 않게 false 추천
  # CodeRabbit 동작을 디버깅해야 할 때 true로 변경
  review_details: false

  # CodeRabbit 특유의 poem/fortune 같은 장식성 메시지
  # 팀 프로젝트에서는 불필요하므로 false 추천
  poem: false
  in_progress_fortune: false

  # walkthrough를 접힌 형태로 보여줄지 여부
  # true: 댓글이 깔끔해짐
  # false: 바로 펼쳐져 보여서 초반 확인이 쉬움
  # 팀원들이 PR 댓글 길다고 느끼면 true로 변경
  collapse_walkthrough: false

  # 시퀀스 다이어그램 생성
  # API 흐름/상태 흐름이 복잡해지면 유용
  # 단순 UI 수정 PR에서 과하다고 느껴지면 false로 변경
  sequence_diagrams: true

  # 리뷰 예상 난이도 표시
  # PR 크기 판단에 도움됨
  # 팀에서 별로 안 보면 false로 바꿔도 됨
  estimate_code_review_effort: true

  # 관련 이슈/PR 추정
  # GitHub Issue를 적극적으로 쓰기 시작하면 true 유지
  # 이슈를 거의 안 쓰면 false로 바꿔도 됨
  assess_linked_issues: true
  related_issues: true
  related_prs: true

  # 라벨 추천
  # 나중에 GitHub label을 "feature", "bug", "refactor", "ui", "api" 등으로 운영하면 유용
  # 지금 라벨 운영 안 하면 false도 가능
  suggested_labels: true

  # 라벨 자동 적용
  # 초반에는 AI가 라벨을 멋대로 붙이지 않게 false 추천
  # 라벨 체계가 안정되면 true 검토
  auto_apply_labels: false

  # 리뷰어 추천
  # 팀원이 GitHub reviewer를 적극적으로 쓰면 true 유지
  # 추천이 이상하면 false로 변경
  suggested_reviewers: true

  # 리뷰어 자동 지정
  # 초반에는 false 추천
  # 파트별 담당자가 명확해지면 true 검토 가능
  auto_assign_reviewers: false

  auto_review:
    # PR 자동 리뷰 켜기
    # CodeRabbit을 수동 호출만 하고 싶으면 false로 변경
    enabled: true

    # Draft PR 리뷰 여부
    # false: Draft PR은 리뷰하지 않음. 초기 추천
    # true: 작업 중간에도 AI 피드백 받고 싶을 때
    drafts: false

    # PR에 새 커밋이 push될 때마다 증분 리뷰
    # true: 새 변경분만 계속 봐줌. 일반적으로 추천
    # false: PR 처음 열 때만 자동 리뷰, 이후는 @coderabbitai review로 수동 호출
    auto_incremental_review: true

    # 자동 리뷰 후 일정 커밋 수가 쌓이면 자동 리뷰 일시 중지
    # 기본값은 5로 알려져 있음
    # PR에 커밋을 잘게 많이 쌓는 팀이면 10 정도로 늘려도 됨
    # 매 커밋마다 계속 봐주길 원하면 0 검토
    auto_pause_after_reviewed_commits: 5

    # 자동 리뷰 대상 base branch
    # 기본 브랜치(main)는 기본적으로 포함됨.
    # develop으로 PR을 모으는 구조라면 develop 추가가 중요
    # release 브랜치를 쓰기 시작하면 "release/.*" 추가
    base_branches:
      - "develop"
      # - "release/.*"
      # - "hotfix/.*"
      # - ".*" # 모든 base branch 대상. 너무 넓어서 초반에는 비추천

    # PR 제목에 아래 키워드가 있으면 자동 리뷰 스킵
    # 팀 컨벤션에 맞게 추가 가능
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "[skip review]"
      - "draft"

    # 특정 봇 계정 PR은 리뷰 스킵
    # Dependabot PR도 리뷰받고 싶으면 dependabot[bot] 제거
    ignore_usernames:
      - "dependabot[bot]"
      - "github-actions[bot]"

    # 라벨 기반 자동 리뷰 제어
    # 지금은 모든 PR 리뷰가 편하므로 비워둠
    # 나중에 "review-ready" 라벨 붙은 PR만 리뷰하게 하려면:
    # enabled: false
    # labels:
    #   - "review-ready"
    labels: []

    # PR 설명에 특정 키워드가 있을 때만 리뷰하도록 만들 수 있음
    # 자동 리뷰를 끄고 필요할 때만 돌리는 팀이면 사용
    # 예: description_keyword: "coderabbit:review"
    description_keyword: ""

  # 리뷰 대상 파일 필터
  # !로 시작하면 리뷰 제외
  # 빌드 결과물, 캐시, 이미지, 의존성 파일은 리뷰 가치가 낮아서 제외
  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/coverage/**"
    - "!**/.cache/**"
    - "!**/.vite/**"

    # 이미지/바이너리 에셋 제외
    # SVG를 React 컴포넌트처럼 직접 관리한다면 !**/*.svg를 추가하지 않는 편이 나음
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.jpeg"
    - "!**/*.webp"
    - "!**/*.gif"
    - "!**/*.ico"

    # lock 파일은 기본적으로 제외되는 경우가 많음
    # 하지만 의존성 변경 리뷰를 받고 싶다면 lock 파일 제외는 추가하지 않는 걸 추천
    # - "!**/package-lock.json"
    # - "!**/yarn.lock"
    # - "!**/pnpm-lock.yaml"

  # 경로별 리뷰 지시
  # 개발이 진행되면서 폴더 구조가 바뀌면 여기 path만 맞춰주면 됨
  path_instructions:
    - path: "**/*.{ts,tsx,js,jsx}"
      instructions: |
        React + TypeScript 프론트엔드 코드 기준으로 리뷰해줘.
        특히 다음을 중점적으로 확인해줘:
        - 타입 안정성, any 남용, null/undefined 처리
        - 불필요한 리렌더링, useEffect 의존성 누락
        - 컴포넌트 책임 분리와 재사용성
        - 조건부 렌더링에서 로딩/에러/빈 상태 누락
        - 사용자 입력값 검증과 예외 케이스
        - console.log, 임시 코드, 하드코딩된 값

    - path: "src/apis/**"
      instructions: |
        API 연동 코드를 중점적으로 리뷰해줘.
        요청/응답 타입, 에러 처리, 토큰/민감정보 노출 가능성, 중복 API 로직, 서버 명세와 맞지 않을 수 있는 필드명을 확인해줘.
        나중에 swagger/openapi 명세가 생기면 명세와 불일치할 가능성이 있는 부분을 더 적극적으로 지적해줘.

    - path: "src/components/**"
      instructions: |
        공통 컴포넌트 기준으로 리뷰해줘.
        props 설계, 재사용성, 접근성, 스타일 중복, 너무 많은 책임을 가진 컴포넌트 여부를 확인해줘.
        UI 컴포넌트가 pages의 비즈니스 로직을 과하게 알고 있으면 분리 방향을 제안해줘.

    - path: "src/pages/**"
      instructions: |
        페이지 단위 흐름을 중점적으로 리뷰해줘.
        라우팅, 로그인/권한 분기, 로딩/에러/빈 상태, 사용자 경험상 어색한 흐름을 확인해줘.
        나중에 기획서/와이어프레임이 확정되면 화면 흐름과 맞지 않을 가능성도 지적해줘.

    - path: "src/hooks/**"
      instructions: |
        커스텀 훅의 책임 분리, useEffect 의존성 배열, 상태 관리 흐름, 불필요한 재호출, 메모리 누수 가능성을 확인해줘.
        API 호출 훅과 UI 상태 훅이 과하게 섞이면 분리 방향을 제안해줘.

    - path: "src/context/**"
      instructions: |
        Context 사용 범위, 전역 상태 남용, Provider 위치, 불필요한 전체 리렌더링 가능성을 확인해줘.
        전역으로 둘 필요가 없는 상태가 Context에 올라가면 지적해줘.

    - path: "src/constants/**"
      instructions: |
        하드코딩 제거, 상수명 일관성, 중복 상수, 실제 도메인/화면 명세와 어긋날 수 있는 값을 확인해줘.

    - path: "src/enums/**"
      instructions: |
        enum 값의 네이밍 일관성, API 응답값과의 매칭, 타입 안정성, 중복 정의 여부를 확인해줘.

    - path: "src/utils/**"
      instructions: |
        유틸 함수의 책임 분리, 순수 함수 여부, 예외 케이스, 날짜/문자열/배열 처리 로직의 안정성을 확인해줘.

    - path: "**/*.{css,scss}"
      instructions: |
        전역 스타일 충돌, Tailwind와 CSS 혼용 문제, 반응형 처리, 접근성, 중복 스타일을 확인해줘.
        Tailwind class가 과도하게 길어지거나 반복되면 컴포넌트/상수화 방향을 제안해줘.

    - path: "package.json"
      instructions: |
        의존성 추가/삭제, scripts 변경, 개발/운영 의존성 구분, 불필요한 패키지 추가 여부를 확인해줘.
        새 패키지가 추가되면 기존 의존성으로 대체 가능한지, 번들 크기에 영향을 줄 수 있는지 확인해줘.

    - path: ".github/**"
      instructions: |
        GitHub Actions, PR 템플릿, 이슈 템플릿 변경 시 빌드/린트 자동화 흐름이 깨지지 않는지 확인해줘.

  # PR 머지 전 체크
  # 지금은 warning 중심으로만 둠.
  # 나중에 팀 규칙이 안정되면 mode를 error로 올릴 수 있음.
  pre_merge_checks:
    # PR 제목 체크
    # 나중에 커밋/PR 컨벤션을 강제하고 싶으면 warning -> error
    title:
      mode: warning
      requirements: >
        PR 제목은 변경 내용을 간결하게 설명해야 하며,
        가능하면 feat:, fix:, refactor:, chore:, docs: 중 하나로 시작하는 것을 권장한다.

    # PR 설명 체크
    # PR 템플릿을 만들면 warning 유지 추천
    # 설명 없는 PR을 막고 싶으면 error로 변경
    description:
      mode: warning

    # JS/TS 프론트 코드에는 docstring 강제 필요성이 낮아서 off 추천
    # 라이브러리성 util이 많아지면 warning으로 변경 가능
    docstrings:
      mode: off

    # 이슈 연동 체크
    # GitHub Issue를 본격적으로 쓰기 시작하면 warning 또는 error로 변경
    issue_assessment:
      mode: off

    # 커스텀 체크
    # 나중에 팀 규칙이 생기면 여기 추가
    # 예: "console.log가 남아 있으면 지적", "임시 mock 데이터가 배포 코드에 들어가면 경고"
    custom_checks: []
    # custom_checks:
    #   - name: "No temporary debug code"
    #     mode: warning
    #     instructions: |
    #       console.log, debugger, TODO 임시 처리, mock 데이터가 운영 코드에 남아 있으면 경고해줘.

  # Finishing Touches
  # CodeRabbit UI에서 docstring/test/simplify 생성 버튼으로 이어지는 기능
  # 자동 실행은 아니지만, 팀원이 헷갈리면 일부를 꺼도 됨.
  finishing_touches:
    docstrings:
      # 초반 프론트 개발에서는 크게 중요하지 않음
      # util/helper 함수가 많아지면 true 유지 또는 명시적 사용
      enabled: true

    unit_tests:
      # 테스트 도입 전에는 생성 결과가 애매할 수 있음
      # Vitest/React Testing Library 세팅 후 적극 활용 추천
      enabled: true

    simplify:
      # 자동 단순화 제안
      # 초반에는 과한 수정이 나올 수 있어 false 추천
      # 코드가 커지고 리팩토링 단계에 들어가면 true 검토
      enabled: false

# CodeRabbit이 사용하는 도구 설정
# 대부분 기본값이 true라 굳이 안 써도 되지만,
# 프론트 레포에서 의미 있는 도구만 명시적으로 남겨둔 형태
tools:
  eslint:
    # eslint.config.js가 있으므로 켜두는 것 추천
    enabled: true

  reactDoctor:
    # React 코드의 성능/정확성/접근성 문제를 보는 도구
    # 리뷰가 너무 시끄러우면 false로 변경 가능
    enabled: true

  github-checks:
    # GitHub Actions 체크 결과를 CodeRabbit이 참고
    # CI 붙인 뒤에도 true 유지 추천
    enabled: true
    # CI가 오래 걸리면 timeout_ms를 늘릴 수 있음
    # 기본 90초, 최대 15분
    timeout_ms: 90000

  markdownlint:
    # README/문서 스타일 지적
    # 문서 리뷰가 너무 귀찮으면 false
    enabled: true

  trufflehog:
    # 토큰/시크릿 노출 감지
    # 웬만하면 끄지 말 것
    enabled: true

  osvScanner:
    # 패키지 취약점 스캔
    # Dependabot/Snyk와 같이 써도 됨
    enabled: true

  stylelint:
    # 현재 stylelint 설정 파일이 없다면 실효성이 낮을 수 있음
    # CSS 규칙을 따로 운영하지 않으면 false로 바꿔도 됨
    enabled: false

  biome:
    # ESLint와 역할이 일부 겹칠 수 있음
    # Biome을 실제로 도입하기 전까지는 false 추천
    enabled: false